name: Android Build

on:
  workflow_dispatch:
    inputs:
      play_track:
        description: Google Play testing track
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - internal
      release_status:
        description: Google Play release status
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed

jobs:
  android-release:
    name: Build Signed Android Release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Assign unique Android version code
        shell: bash
        run: |
          export VERSION_CODE=$((100000 + GITHUB_RUN_NUMBER))
          node -e "const fs=require('fs'); const p='app.json'; const app=JSON.parse(fs.readFileSync(p,'utf8')); app.expo.android.versionCode=Number(process.env.VERSION_CODE); fs.writeFileSync(p, JSON.stringify(app,null,2)+'\n');"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "Building Android version code $VERSION_CODE"

      - name: Run Expo Doctor
        run: npx expo-doctor .

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Decode production keystore
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/karri-mobile-release.jks
          keytool -list \
            -keystore android/karri-mobile-release.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS"

      - name: Configure Android release signing
        run: |
          cat > android/ci-release-signing.gradle <<'GRADLE'
          gradle.afterProject { project ->
              if (project.path == ":app") {
                  project.android {
                      signingConfigs {
                          karriRelease {
                              storeFile file("karri-mobile-release.jks")
                              storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                              keyAlias System.getenv("ANDROID_KEY_ALIAS")
                              keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                          }
                      }

                      buildTypes {
                          release {
                              signingConfig signingConfigs.karriRelease
                          }
                      }
                  }
              }
          }
          GRADLE

          cat android/ci-release-signing.gradle

      - name: Build signed release APK and AAB
        run: |
          cd android
          chmod +x ./gradlew
          printf '\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8\nkotlin.daemon.jvmargs=-Xmx1g -XX:MaxMetaspaceSize=512m\n' >> gradle.properties
          ./gradlew -I ci-release-signing.gradle assembleRelease bundleRelease --stacktrace --info --console=plain

      - name: Verify signed APK
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk
          if "$BUILD_TOOLS/apksigner" verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk | grep -q "CN=Android Debug"; then
            echo "Release APK is debug-signed. Failing build."
            exit 1
          fi
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/karri-mobile-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/karri-mobile-release.aab

          sha256sum android/app/build/outputs/apk/release/karri-mobile-release.apk > android/app/build/outputs/apk/release/karri-mobile-release.apk.sha256
          sha256sum android/app/build/outputs/bundle/release/karri-mobile-release.aab > android/app/build/outputs/bundle/release/karri-mobile-release.aab.sha256

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: karri-mobile-release-apk
          path: |
            apps/mobile/android/app/build/outputs/apk/release/karri-mobile-release.apk
            apps/mobile/android/app/build/outputs/apk/release/karri-mobile-release.apk.sha256
          if-no-files-found: error

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v5
        with:
          name: karri-mobile-release-aab
          path: |
            apps/mobile/android/app/build/outputs/bundle/release/karri-mobile-release.aab
            apps/mobile/android/app/build/outputs/bundle/release/karri-mobile-release.aab.sha256
          if-no-files-found: error

      - name: Upload AAB to Google Play testing
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.karrimobile.app
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/karri-mobile-release.aab
          tracks: ${{ inputs.play_track }}
          status: ${{ inputs.release_status }}
          releaseName: 1.0.0 (${{ env.VERSION_CODE }})
