name: Android Build

on:
  workflow_dispatch:

jobs:
  android-apk:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run Expo Doctor
        run: npx expo-doctor .

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          echo 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8' >> gradle.properties
          ./gradlew assembleRelease

      - name: Sign release APK with debug key for emulator validation
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out android/app/build/outputs/apk/release/karri-mobile-standalone-release.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload standalone APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: karri-mobile-standalone-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/karri-mobile-standalone-release.apk
          if-no-files-found: error

