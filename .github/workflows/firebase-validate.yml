name: Firebase Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/firebase/**"
      - "package.json"
      - "package-lock.json"
      - ".firebaserc"
      - ".github/workflows/firebase-validate.yml"
  push:
    branches:
      - main
    paths:
      - "backend/firebase/**"
      - "package.json"
      - "package-lock.json"
      - ".firebaserc"
      - ".github/workflows/firebase-validate.yml"

permissions:
  contents: read

jobs:
  firebase-validate:
    name: Validate Firebase backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/firebase/functions/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install root dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci
        working-directory: backend/firebase/functions

      - name: Validate Firebase backend
        run: npm run firebase:validate
