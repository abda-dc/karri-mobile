      - Technical Architecture: architecture/technical-architecture.md
      - Platform Services: architecture/platform-services.md
      - Technology Roadmap: architecture/technology-roadmap.md
      - Domain Model: architecture/domain-model.md
      - Repository Pattern: architecture/repository-pattern.md
      - Application Services: architecture/application-services.md
      - Notification Delivery: architecture/notification-delivery.md
      - Error Handling: architecture/error-handling.md
