site_name: Karri Platform Handbook
site_description: Product and engineering handbook for the Karri mobile-first cross-border shipping platform.
site_author: Karri
site_url: https://abda-dc.github.io/karri-mobile/
repo_name: abda-dc/karri-mobile
repo_url: https://github.com/abda-dc/karri-mobile
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

nav:
  - Home: index.md
  - Strategy:
      - Executive Summary: strategy/executive-summary.md
      - Vision and Mission: strategy/vision-and-mission.md
      - Product Constitution: strategy/product-constitution.md
      - Product Strategy: strategy/product-strategy.md
      - Business Model: strategy/business-model.md
  - Product:
